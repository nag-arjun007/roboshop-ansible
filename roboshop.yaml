- name: roboshop instances management
  hosts: local
  connection: local
  become: yes
  vars:
    sg_ids:
      mongodb: sg-065ab26d1d25a0a14
      redis: sg-037bdad0c09e549ba
      mysql: sg-02251b4d45fc82e52
      rabbitmq: sg-05a4968abc82b6192
      catalogue: sg-011cfbe35b770702e
      user: sg-00679feb83fa55f84
      cart: sg-0a572f9ea012e08c7
      shipping: sg-0d7843f88a41ec273
      payment: sg-07b22dc8083311c07
      frontend: sg-05a3be0c4ce2d8ecb
    instances: ["mongodb", "redis", "mysql", "rabbitmq", "catalogue", "user", "cart", "shipping", "payment", "frontend"]
    image_id: ami-0220d79f3f480ecf5
    instance_type: t3.micro
    domain_name: arjundevops.xyz
    action: create
  tasks:
  - name: create ec2 instance
    amazon.aws.ec2_instance:
      instance_type: "{{ instance_type }}"
      name: "roboshop-{{ item }}"
      image_id: "{{ image_id }}"
      region: us-east-1
      security_group_ids:
      - "{{ sg_ids[item] }}"
      - roboshop-common
    loop: "{{ instances }}"
    register: ec2_output
    when: action == "create"

  - name: print output
    debug:
      msg: "{{ ec2_output }}"  